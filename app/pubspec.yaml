name: chosen_object
description: "Chosen Object"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  jwt_decoder: ^2.0.1
  http: ^1.2.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2
  geolocator: ^14.0.2
  image_picker: ^1.1.2
  image_cropper: ^9.0.0
  flutter_svg: ^2.0.17
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1
  web_socket_channel: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_icon.png"
  adaptive_icon_background: "#F2EBE0"
  adaptive_icon_foreground: "assets/logo_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
