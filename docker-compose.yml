services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ChosenObj2026!
      MYSQL_DATABASE: chosen_object
      MYSQL_USER: chosen
      MYSQL_PASSWORD: ChosenObj2026!
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3008:3306"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8002:8002"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  db_data:
