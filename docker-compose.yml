# =============================================================================
# Chosen Object — docker-compose.yml
#
# Servicio único con MySQL + FastAPI + Vue frontend
#
# REQUISITOS:
#   mkdir -p ~/chosen-object-data/mysql
#   Crear ~/chosen-object-data/secrets.env con:
#     DB_NAME=chosen_object
#     DB_USER=chosen
#     DB_PASSWORD=<password seguro>
#     JWT_SECRET_KEY=<openssl rand -hex 32>
#
# START:   docker compose up -d --build
# LOGS:    docker logs -f chosen-object
# STOP:    docker compose down
# =============================================================================

services:
  chosen-object:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chosen-object
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "8002:8002"
    volumes:
      - ~/chosen-object-data/mysql:/var/lib/mysql
      - ~/chosen-object-data/secrets.env:/run/secrets.env:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
